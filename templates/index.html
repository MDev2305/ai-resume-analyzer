<!DOCTYPE html>
<html>
<head>
    <title>Smart AI Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main">
    <div class="card">

        <h1>🚀 Resume Analyzer</h1>
        <p class="subtitle">Analyze your resume with AI</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" required>

            <textarea name="job_desc" placeholder="Paste Job Description..." required></textarea>

            <button type="submit">Analyze Resume</button>
        </form>

        {% if score %}
        <div class="result">

            <h2>Match Score</h2>

            <div class="progress">
                <div class="progress-bar">{{ score }}%</div>
            </div>

            <div class="grid">
                <div class="box">
                    <h3>Missing Skills</h3>
                    <ul>
                        {% for skill in missing_skills[:8] %}
                            <li>{{ skill }}</li>
                        {% endfor %}
                    </ul>
                </div>

                <div class="box">
                    <h3>Suggestions</h3>
                    <ul>
                        {% for s in suggestions %}
                            <li>{{ s }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

        </div>
        {% endif %}

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
